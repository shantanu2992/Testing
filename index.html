<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily News Summarizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Daily News Summarizer</h1>
        <p>
          Generate a quick daily digest from CNN and Morning Brew using their
          latest RSS headlines.
        </p>
      </header>

      <section class="controls">
        <button id="refreshBtn">Generate Today\'s Summary</button>
        <p id="status" aria-live="polite">Ready.</p>
      </section>

      <section class="summary-grid">
        <article>
          <h2>CNN</h2>
          <ul id="cnnSummary" class="summary-list"></ul>
        </article>

        <article>
          <h2>Morning Brew</h2>
          <ul id="brewSummary" class="summary-list"></ul>
        </article>
      </section>

      <section class="headlines">
        <h2>Source Headlines</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Source</th>
                <th>Headline</th>
                <th>Published</th>
              </tr>
            </thead>
            <tbody id="headlineRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
